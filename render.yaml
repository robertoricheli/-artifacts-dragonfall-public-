# Deploy no Render: https://render.com/docs/blueprint-spec
# New > Blueprint > conectar repositório > caminho server/render.yaml
# Ou: Dashboard → Blueprints → Sync (após push deste arquivo)
services:
  - type: web
    name: dragonfall-multiplayer
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://dragonfall.netlify.app,http://127.0.0.1:5173,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: dragonfall-postgres
          property: connectionString
      # Opcional legado. passwordEnc não é mais gravado; forgot usa senha temporária + hash.
      - key: DF_AUTH_ENC_KEY
        sync: false
      # E-mail (Esqueci a senha) — ver server/MAIL-SETUP.md
      # - key: DF_SMTP_HOST
      #   value: smtp.gmail.com
      # - key: DF_SMTP_USER
      #   sync: false
      # - key: DF_SMTP_PASS
      #   sync: false
      # - key: DF_MAIL_FROM
      #   value: Dragonfall <noreply@example.com>

databases:
  - name: dragonfall-postgres
    plan: free
    databaseName: dragonfall
    user: dragonfall
